name: Build Windows Installer

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild --force --types prod,dev,optional --module-dir . --which-module sharp
        env:
          npm_config_platform: win32
          npm_config_arch: x64

      - name: Build Next.js
        run: npm run build:next

      - name: Build Electron TypeScript
        run: npm run build:electron-ts

      - name: Build Windows installer (electron-builder)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release output
        run: Get-ChildItem -Recurse release | Select-Object FullName
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EverFern-Windows-Installer
          path: |
            release/*.exe
            release/*.yml
          retention-days: 30

      # ── Versioned release on tag push ──────────────────────────────────────
      - name: Create versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: EverFern ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## EverFern ${{ github.ref_name }}

            EverFern is an open-source autonomous AI desktop agent.

            ### Installation
            Download and run the `.exe` installer below. It will install EverFern to your user profile (no admin required).

            ### What's new
            See the auto-generated release notes below.

            ---
            **License:** MIT — open source, free to use and modify.
            **Source:** https://github.com/${{ github.repository }}
          files: |
            release/*.exe
            release/latest.yml

      # ── Rolling pre-release on main branch push ────────────────────────────
      - name: Update rolling latest pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Build (main)
          draft: false
          prerelease: true
          generate_release_notes: false
          body: |
            Automated build from the `main` branch. This is a pre-release — use versioned releases for stable builds.

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.run_id }}
          files: |
            release/*.exe
            release/latest.yml
