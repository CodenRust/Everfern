name: Build and Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install macOS Dependencies
        if: matrix.os == 'macos-latest'
        run: brew install vips

      - name: Install Node Modules
        run: npm install

      # Recompiles heavy binaries safely for the matching host architecture
      - name: Compile Native Modules
        run: npm run rebuild:electron

      - name: Package NextJS & Electron Application
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Everfern-${{ matrix.os }}
          path: release/*
          if-no-files-found: error
