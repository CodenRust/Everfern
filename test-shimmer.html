<!DOCTYPE html><html><head><style>
    body { background: #333; margin: 0; height: 100vh; }
    @keyframes navis-shimmer-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    #navis-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2147483647;
    }
    #navis-border {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    #navis-border::before, #navis-border::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, #ff8a00, #e52e71, #9b51e0, #4facfe, #00f2fe, #4facfe, #9b51e0, #e52e71, #ff8a00);
      background-size: 300% 300%;
      animation: navis-shimmer-bg 4s linear infinite;
      padding: 4px;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    #navis-border::after {
      filter: blur(12px);
      opacity: 0.8;
    }
</style></head><body><div id='navis-overlay'><div id='navis-border'></div></div></body></html>
