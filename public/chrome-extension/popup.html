<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EverFern Web Automation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="images/icon-48.png" alt="EverFern" class="logo-img">
      <h1>EverFern Automation</h1>
    </header>

    <div class="status-grid">
      <div class="status-card main-status">
        <span class="status-label">Extension Status</span>
        <div class="status-value-wrapper">
          <span class="status-indicator inactive" id="extensionStatus"></span>
          <span class="status-value" id="extensionStatusText">Inactive</span>
        </div>
      </div>
      
      <div class="status-card">
        <span class="status-label">Playwright</span>
        <div class="status-value-wrapper">
          <span class="status-indicator inactive" id="playwrightStatus"></span>
          <span class="status-value" id="playwrightStatusText">Not Detected</span>
        </div>
      </div>

      <div class="status-card">
        <span class="status-label">Shimmer</span>
        <div class="status-value-wrapper">
          <span class="status-indicator inactive" id="shimmerStatus"></span>
          <span class="status-value" id="shimmerStatusText">Off</span>
        </div>
      </div>
    </div>

    <section class="panel">
      <span class="panel-title">Automation Controls</span>
      <div class="button-grid">
        <button class="btn-primary" id="detectPlaywrightBtn">
          🔍 Detect Playwright
        </button>
        <button class="btn-primary" id="activateBtn" disabled>
          ⚡ Activate Extension
        </button>
      </div>
      
      <div class="button-row">
        <button class="btn-secondary" id="applyShimmerBtn" disabled>
          ✨ Shimmer
        </button>
        <button class="btn-secondary" id="captureElementsBtn" disabled>
          📸 Capture
        </button>
      </div>

      <div class="button-grid">
        <button class="btn-danger" id="deactivateBtn" disabled>
          🛑 Deactivate
        </button>
      </div>
    </section>

    <div class="info-toast" id="infoSection">
      <strong id="infoTitle">Information</strong>
      <span id="infoMessage"></span>
    </div>

    <div class="error-toast" id="errorMessage"></div>

    <footer class="footer">
      EverFern Desktop v1.0.0
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
